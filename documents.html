{% extends "base.html" %}
{% block content %}
<div class="card p-4">
  <h3>Upload Document</h3>

  <form method="post" enctype="multipart/form-data">
    <input class="form-control mb-2" type="file" name="file" required>
    <button class="btn btn-primary">Upload</button>
  </form>

  <hr>

  <h4>My Documents</h4>

  {% if my_docs %}
    <ul class="list-group">
      {% for d in my_docs %}
        <li class="list-group-item d-flex justify-content-between align-items-center">
          <div>
            <b>{{ d[1] }}</b><br>
            <small class="text-muted">{{ d[2] }}</small>
          </div>
          <a class="btn btn-sm btn-success" href="/download/{{ d[0] }}">Download</a>
        </li>
      {% endfor %}
    </ul>
  {% else %}
    <p class="text-muted">No documents uploaded yet.</p>
  {% endif %}

  <a class="btn btn-link mt-2" href="/dashboard">Back</a>
</div>
{% endblock %}
