<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>{{ title if title else "Experiment 7 - Flask DBMS" }}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-dark bg-dark">
  <div class="container">
    <a class="navbar-brand" href="/dashboard">Exp7</a>

    <div>
      {% if session.get("user_id") %}
        <a class="btn btn-sm btn-outline-light" href="/grades">Grades</a>
        <a class="btn btn-sm btn-outline-light" href="/documents">Documents</a>
        <a class="btn btn-sm btn-outline-light" href="/logout">Logout</a>
      {% endif %}
    </div>
  </div>
</nav>

<div class="container mt-4">
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
      {% for category, msg in messages %}
        <div class="alert alert-{{ category }}">{{ msg }}</div>
      {% endfor %}
    {% endif %}
  {% endwith %}

  {% block content %}{% endblock %}
</div>

</body>
</html>
